<script>
(() => {
  "use strict";

  // =========================================
  // CONFIG
  // =========================================
  const CONFIG = {
    DEMO_URL: "https://exchange-8gxt.onrender.com",
    REVEAL_THRESHOLD: 0.12,
    COUNTER_DURATION: 1600,
    NAV_SCROLL_OFFSET: 40
  };

  // =========================================
  // HELPERS
  // =========================================
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => [...r.querySelectorAll(s)];

  // =========================================
  // SCROLL REVEAL
  // =========================================
  const revealObserver = new IntersectionObserver(
    (entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("in");
        obs.unobserve(entry.target);
      });
    },
    { threshold: CONFIG.REVEAL_THRESHOLD }
  );

  $$("[data-reveal]").forEach((el, i) => {
    el.style.transitionDelay = `${(i % 5) * 70}ms`;
    revealObserver.observe(el);
  });

  // =========================================
  // COUNTERS
  // =========================================
  function animateCounter({ element, target, prefix = "", suffix = "", duration = CONFIG.COUNTER_DURATION }) {
    const start = performance.now();

    function tick(now) {
      const progress = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const value = Math.round(eased * target);

      element.textContent = `${prefix}${value}${suffix}`;

      if (progress < 1) requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  const counterObserver = new IntersectionObserver(
    (entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        const el = entry.target;
        const target = Number(el.dataset.count || 0);

        if (el.dataset.display) {
          el.textContent = el.dataset.display;
          obs.unobserve(el);
          return;
        }

        animateCounter({
          element: el,
          target,
          prefix: el.dataset.prefix || "",
          suffix: el.dataset.suffix || ""
        });

        obs.unobserve(el);
      });
    },
    { threshold: 0.45 }
  );

  $$("[data-count]").forEach(el => counterObserver.observe(el));

  // =========================================
  // HERO COUNTERS
  // =========================================
  const heroCounters = [
    { id: "counter-close", target: 41, suffix: "%" },
    { id: "counter-leads", target: 127, suffix: "" }
  ];

  heroCounters.forEach((c, i) => {
    const el = document.getElementById(c.id);
    if (!el) return;

    setTimeout(() => {
      animateCounter({
        element: el,
        target: c.target,
        suffix: c.suffix,
        duration: 1800
      });
    }, 700 + i * 150);
  });

  // =========================================
  // FEATURE SWITCHER
  // =========================================
  const featureItems = $$(".feat");
  const featurePanels = $$(".preview-panel");

  function switchFeature(index) {
    featureItems.forEach(i => i.classList.remove("active"));
    featurePanels.forEach(p => p.classList.remove("active"));

    const activeItem = document.querySelector(`.feat[data-feat="${index}"]`);
    const activePanel = document.getElementById(`feat-${index}`);

    if (activeItem) activeItem.classList.add("active");
    if (activePanel) activePanel.classList.add("active");
  }

  featureItems.forEach(item => {
    if (item.dataset.bound) return;
    item.dataset.bound = "1";

    item.addEventListener("click", () => {
      switchFeature(item.dataset.feat);
    });
  });

  // =========================================
  // FAQ
  // =========================================
  const faqItems = $$(".faq-item");

  function toggleFaq(item) {
    const isOpen = item.classList.contains("open");

    faqItems.forEach(f => f.classList.remove("open"));

    if (!isOpen) item.classList.add("open");
  }

  faqItems.forEach(item => {
    const btn = $(".faq-btn", item);
    if (!btn || btn.dataset.bound) return;

    btn.dataset.bound = "1";

    btn.addEventListener("click", e => {
      e.preventDefault();
      toggleFaq(item);
    });
  });

  if (faqItems.length && !$(".faq-item.open")) {
    faqItems[0].classList.add("open");
  }

  // =========================================
  // SMOOTH SCROLL
  // =========================================
  $$('a[href^="#"]').forEach(link => {
    link.addEventListener("click", e => {
      const id = link.getAttribute("href")?.slice(1);
      const target = id ? document.getElementById(id) : null;

      if (!target) return;

      e.preventDefault();

      target.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    });
  });

  // =========================================
  // DEMO CTA
  // =========================================
  function openDemo() {
    window.open(CONFIG.DEMO_URL, "_blank", "noopener,noreferrer");
  }

  $$(".btn-primary, .btn-white, .nav-cta").forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = "1";

    btn.addEventListener("click", e => {
      e.preventDefault();
      openDemo();
    });
  });

  // =========================================
  // NAVBAR
  // =========================================
  const nav = document.querySelector("nav");

  function updateNav() {
    if (!nav) return;

    const scrolled = window.scrollY > CONFIG.NAV_SCROLL_OFFSET;

    nav.style.boxShadow = scrolled
      ? "0 10px 40px rgba(10,14,26,.08)"
      : "none";

    nav.style.background = scrolled
      ? "rgba(247,248,252,.98)"
      : "rgba(247,248,252,.92)";
  }

  window.addEventListener("scroll", updateNav, { passive: true });
  updateNav();

  // =========================================
  // LOAD STATE
  // =========================================
  window.addEventListener("load", () => {
    document.body.classList.add("loaded");
  });

})();
</script>

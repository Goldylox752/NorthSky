<script>
(() => {

  "use strict";

  // =========================================
  // CONFIG
  // =========================================
  const CONFIG = {
    DEMO_URL: "https://exchange-8gxt.onrender.com",
    REVEAL_THRESHOLD: 0.12,
    COUNTER_DURATION: 1600,
    NAV_SCROLL_OFFSET: 40
  };

  // =========================================
  // HELPERS
  // =========================================
  const $ = (selector, scope = document) =>
    scope.querySelector(selector);

  const $$ = (selector, scope = document) =>
    [...scope.querySelectorAll(selector)];

  // =========================================
  // SCROLL REVEAL
  // =========================================
  const revealObserver = new IntersectionObserver(
    (entries) => {

      entries.forEach((entry) => {

        if (!entry.isIntersecting) return;

        entry.target.classList.add("in");

        revealObserver.unobserve(entry.target);

      });

    },
    {
      threshold: CONFIG.REVEAL_THRESHOLD
    }
  );

  $$("[data-reveal]").forEach((el, index) => {

    el.style.transitionDelay =
      `${(index % 5) * 70}ms`;

    revealObserver.observe(el);

  });

  // =========================================
  // COUNTERS
  // =========================================
  function animateCounter({
    element,
    target,
    prefix = "",
    suffix = "",
    duration = CONFIG.COUNTER_DURATION
  }) {

    const startTime = performance.now();

    function update(now) {

      const progress =
        Math.min((now - startTime) / duration, 1);

      const eased =
        1 - Math.pow(1 - progress, 3);

      const current =
        Math.round(eased * target);

      element.textContent =
        `${prefix}${current}${suffix}`;

      if (progress < 1) {
        requestAnimationFrame(update);
      }

    }

    requestAnimationFrame(update);

  }

  const counterObserver = new IntersectionObserver(
    (entries) => {

      entries.forEach((entry) => {

        if (!entry.isIntersecting) return;

        const el = entry.target;

        const target =
          parseFloat(el.dataset.count || 0);

        const prefix =
          el.dataset.prefix || "";

        const suffix =
          el.dataset.suffix || "";

        const display =
          el.dataset.display;

        // Static display values
        if (display) {

          el.textContent = display;

          counterObserver.unobserve(el);

          return;

        }

        animateCounter({
          element: el,
          target,
          prefix,
          suffix
        });

        counterObserver.unobserve(el);

      });

    },
    {
      threshold: 0.45
    }
  );

  $$("[data-count]").forEach((el) => {
    counterObserver.observe(el);
  });

  // =========================================
  // HERO METRICS
  // =========================================
  const heroCounters = [
    {
      id: "counter-close",
      target: 41,
      suffix: "%"
    },
    {
      id: "counter-leads",
      target: 127,
      suffix: ""
    }
  ];

  heroCounters.forEach((counter, index) => {

    const el =
      document.getElementById(counter.id);

    if (!el) return;

    setTimeout(() => {

      animateCounter({
        element: el,
        target: counter.target,
        suffix: counter.suffix,
        duration: 1800
      });

    }, 700 + (index * 150));

  });

  // =========================================
  // FEATURE SWITCHER
  // =========================================
  const featureItems =
    $$(".feat");

  const featurePanels =
    $$(".preview-panel");

  function switchFeature(index) {

    featureItems.forEach((item) => {
      item.classList.remove("active");
    });

    featurePanels.forEach((panel) => {
      panel.classList.remove("active");
    });

    const activeItem =
      $(`.feat[data-feat="${index}"]`);

    const activePanel =
      document.getElementById(`feat-${index}`);

    activeItem?.classList.add("active");

    activePanel?.classList.add("active");

  }

  featureItems.forEach((item) => {

    if (item.dataset.bound) return;

    item.dataset.bound = "true";

    item.addEventListener("click", () => {

      switchFeature(item.dataset.feat);

    });

  });

  // =========================================
  // FAQ ACCORDION
  // =========================================
  const faqItems =
    $$(".faq-item");

  function toggleFaq(item) {

    const isOpen =
      item.classList.contains("open");

    faqItems.forEach((faq) => {
      faq.classList.remove("open");
    });

    if (!isOpen) {
      item.classList.add("open");
    }

  }

  faqItems.forEach((item) => {

    const btn =
      $(".faq-btn", item);

    if (!btn || btn.dataset.bound) return;

    btn.dataset.bound = "true";

    btn.addEventListener("click", (e) => {

      e.preventDefault();

      toggleFaq(item);

    });

  });

  // Open first FAQ by default
  if (
    faqItems.length &&
    !$(".faq-item.open")
  ) {
    faqItems[0].classList.add("open");
  }

  // =========================================
  // SMOOTH SCROLL
  // =========================================
  $$('a[href^="#"]').forEach((link) => {

    link.addEventListener("click", (e) => {

      const id =
        link.getAttribute("href").slice(1);

      const target =
        document.getElementById(id);

      if (!target) return;

      e.preventDefault();

      target.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });

    });

  });

  // =========================================
  // DEMO CTA BUTTONS
  // =========================================
  function openDemo() {

    window.open(
      CONFIG.DEMO_URL,
      "_blank",
      "noopener,noreferrer"
    );

  }

  const ctaButtons = $$(
    ".btn-primary, .btn-white, .nav-cta"
  );

  ctaButtons.forEach((btn) => {

    if (btn.dataset.bound) return;

    btn.dataset.bound = "true";

    btn.addEventListener("click", (e) => {

      e.preventDefault();

      openDemo();

    });

  });

  // =========================================
  // NAVBAR SCROLL STATE
  // =========================================
  const nav = $("nav");

  function updateNav() {

    if (!nav) return;

    if (window.scrollY > CONFIG.NAV_SCROLL_OFFSET) {

      nav.style.boxShadow =
        "0 10px 40px rgba(10,14,26,.06)";

      nav.style.background =
        "rgba(247,248,252,.96)";

    } else {

      nav.style.boxShadow = "none";

      nav.style.background =
        "rgba(247,248,252,.92)";

    }

  }

  window.addEventListener(
    "scroll",
    updateNav,
    { passive: true }
  );

  updateNav();

  // =========================================
  // PERFORMANCE
  // =========================================
  window.addEventListener("load", () => {

    document.body.classList.add("loaded");

  });

})();
</script>
